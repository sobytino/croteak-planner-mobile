<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f9187" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CroTeak Planner MOBILE BUILD032 PWA</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#eef5f6;
      --panel:#ffffff;
      --ink:#10212a;
      --muted:#62737a;
      --line:#dbe7e9;
      --line2:#edf3f4;
      --teal:#0e8a80;
      --teal2:#16b9a8;
      --teal3:#dff5f1;
      --danger:#dc4b43;
      --warn:#f4a51c;
      --ok:#21a667;
      --shadow:0 12px 34px rgba(9,38,49,.12);
      --radius:22px;
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; min-height:100%; width:100%; overflow-x:hidden; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
    body{font-size:16px;}
    button,input,select,textarea{font:inherit;}
    button{border:0; cursor:pointer;}
    .app{width:100%; max-width:540px; margin:0 auto; min-height:100vh; background:linear-gradient(180deg,#e9f1f3 0,#f7fbfb 100%); box-shadow:0 0 40px rgba(7,24,28,.08); position:relative; overflow:hidden;}
    .topbar{position:sticky; top:0; z-index:30; background:linear-gradient(135deg,#0b6971 0%,#0fa58e 58%,#16baa9 100%); color:white; padding:calc(12px + var(--safe-top)) 14px 14px; border-bottom-left-radius:0; border-bottom-right-radius:0; box-shadow:0 10px 24px rgba(2,58,60,.22); width:100%;}
    .toprow{display:flex; align-items:center; gap:10px; min-width:0; width:100%;}
    .brand{min-width:0; flex:1; overflow:hidden;}
    .brand h1{margin:0; font-weight:900; letter-spacing:-.04em; font-size:clamp(22px,7.2vw,34px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .build{margin-top:2px; opacity:.95; font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .cloud{flex:0 0 auto; display:flex; align-items:center; gap:7px; border-radius:999px; background:rgba(255,255,255,.20); padding:10px 12px; font-weight:900; white-space:nowrap; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
    .dot{width:10px; height:10px; border-radius:50%; background:#2ee278; box-shadow:0 0 0 3px rgba(46,226,120,.15);}
    .searchrow{display:grid; grid-template-columns:minmax(0,1fr) 54px 54px; gap:10px; margin-top:13px; width:100%;}
    .searchbox{min-width:0; width:100%; border:0; outline:0; padding:15px 16px; border-radius:18px; background:#fff; color:#132933; box-shadow:0 8px 22px rgba(0,0,0,.12); font-size:17px;}
    .iconbtn{height:54px; border-radius:18px; background:rgba(255,255,255,.17); color:white; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);}
    .iconbtn:active,.pillbtn:active,.primary:active,.ghost:active{transform:translateY(1px);}
    .content{padding:14px 14px calc(84px + var(--safe-bottom)); width:100%; min-width:0;}
    .stats{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;}
    .stat{background:rgba(255,255,255,.88); border:1px solid var(--line); border-radius:20px; padding:18px 14px; min-height:86px; box-shadow:0 8px 26px rgba(6,39,47,.07); overflow:hidden;}
    .stat .n{font-size:30px; font-weight:950; letter-spacing:-.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .stat .l{font-size:14px; color:var(--muted); font-weight:850; margin-top:4px;}
    .primary{width:100%; border-radius:20px; padding:18px 18px; background:linear-gradient(135deg,#0e9184,#18c3ad); color:white; font-weight:950; font-size:18px; box-shadow:0 14px 30px rgba(9,145,132,.23);}
    .sectionhead{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:22px 0 12px; min-width:0;}
    .sectionhead h2{font-size:21px; line-height:1.05; margin:0; font-weight:950; letter-spacing:-.03em; text-transform:uppercase; min-width:0; overflow:hidden; text-overflow:ellipsis;}
    .pillbtn{border:1px solid #c6e1df; background:#f7ffff; color:#14796f; border-radius:18px; padding:12px 16px; font-weight:950; white-space:nowrap;}
    .list{display:flex; flex-direction:column; gap:14px;}
    .jobcard{background:#fff; border:1px solid var(--line); border-radius:24px; padding:14px; box-shadow:0 12px 28px rgba(14,44,52,.08); overflow:hidden;}
    .jobtop{display:grid; grid-template-columns:72px minmax(0,1fr) auto; gap:14px; align-items:start;}
    .avatar{width:72px; height:72px; border-radius:18px; display:flex; align-items:center; justify-content:center; background:linear-gradient(145deg,#d5eff8,#caf4e9); color:#0d8278; font-size:35px; font-weight:950; box-shadow:inset 0 0 0 1px rgba(0,0,0,.04); flex:0 0 auto;}
    .jobtitle{font-size:21px; font-weight:950; letter-spacing:-.04em; line-height:1.08; margin:2px 0 6px; overflow:hidden; text-overflow:ellipsis;}
    .jobmeta{font-size:16px; line-height:1.35; color:#66777d; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
    .badge{display:inline-flex; align-items:center; justify-content:center; padding:10px 13px; border-radius:999px; font-weight:950; color:#11786e; background:#e7f7f4; max-width:104px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .badge.upit{background:#ecf2ff;color:#3467a8}.badge.ponuda{background:#eef1ff;color:#5a54c9}.badge.avans{background:#fff4d7;color:#9a6800}.badge.izmjera{background:#e2f5f0;color:#0f776b}.badge.dizajn{background:#f2e8ff;color:#7e42a2}.badge.cnc{background:#e7f0ff;color:#2b5c9b}.badge.spremno{background:#e6f8df;color:#31820d}.badge.montaza{background:#fff0e2;color:#a65d00}.badge.naplaceno{background:#dcf8e9;color:#06743b}.badge.arhiva{background:#edf0f1;color:#53666d}.badge.kasni{background:#ffe5e1;color:#b92b24}
    .moneygrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:14px;}
    .money{background:#fbfcfd; border:1px solid var(--line2); border-radius:16px; padding:12px 12px; min-width:0;}
    .money strong{display:block; font-size:20px; font-weight:950; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .money span{display:block; color:#65767c; font-size:13px; font-weight:850; margin-top:4px;}
    .hidden{display:none !important;}
    .bottomnav{position:fixed; left:50%; transform:translateX(-50%); bottom:0; z-index:40; width:100%; max-width:540px; padding:8px 8px calc(8px + var(--safe-bottom)); background:rgba(255,255,255,.92); border-top:1px solid var(--line); backdrop-filter:blur(14px); display:grid; grid-template-columns:repeat(5,1fr); gap:4px;}
    .navitem{height:54px; border-radius:18px; background:transparent; color:#6b7e84; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:11px; font-weight:900; min-width:0;}
    .navitem .ico{font-size:22px; line-height:1;}
    .navitem.active{color:#0d8b80; background:#e8f8f5;}
    .drawer{position:fixed; inset:0; z-index:80; background:rgba(6,19,25,.42); opacity:0; pointer-events:none; transition:.18s ease;}
    .drawer.open{opacity:1; pointer-events:auto;}
    .drawerpanel{position:absolute; top:0; right:0; width:min(86vw,380px); height:100%; background:#fff; padding:calc(18px + var(--safe-top)) 16px 18px; box-shadow:-20px 0 50px rgba(0,0,0,.22); transform:translateX(105%); transition:.2s ease; overflow:auto;}
    .drawer.open .drawerpanel{transform:translateX(0);}
    .drawerhead{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px;}
    .drawerhead h3{margin:0; font-size:24px; font-weight:950; letter-spacing:-.04em;}
    .closebtn{width:44px; height:44px; border-radius:16px; background:#eef5f6; color:#27434a; font-size:24px; font-weight:950;}
    .menubtn{width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:15px 14px; border-radius:17px; background:#f6fbfb; color:#153039; margin:8px 0; font-weight:900; text-align:left;}
    .menubtn.danger{color:#b72f2a; background:#fff1ef;}
    .screen{display:none; animation:fade .12s ease;}
    .screen.active{display:block;}
    @keyframes fade{from{opacity:.5; transform:translateY(2px)}to{opacity:1; transform:none}}
    .tabs{display:flex; gap:8px; overflow-x:auto; padding:1px 0 10px; scrollbar-width:none; margin:8px 0 2px;}
    .tabs::-webkit-scrollbar{display:none;}
    .chip{flex:0 0 auto; border:1px solid #d6e8ea; background:#fff; color:#486168; padding:10px 13px; border-radius:999px; font-weight:900;}
    .chip.active{background:#0f9187; color:white; border-color:#0f9187;}
    .form{display:grid; gap:12px;}
    .field label{display:block; color:#53666d; font-size:13px; font-weight:900; margin:0 0 6px 4px;}
    .input,.select,.textarea{width:100%; border:1px solid #d9e7e9; background:#fff; color:#13262d; border-radius:16px; padding:14px 14px; outline:none; min-width:0;}
    .textarea{min-height:110px; resize:vertical;}
    .twocol{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
    .threecol{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
    .sheet{position:fixed; inset:0; z-index:70; display:none; background:rgba(4,18,24,.45); align-items:flex-end;}
    .sheet.open{display:flex;}
    .sheetpanel{width:100%; max-width:540px; margin:0 auto; background:#fff; border-top-left-radius:28px; border-top-right-radius:28px; max-height:92vh; overflow:auto; padding:10px 14px calc(22px + var(--safe-bottom)); box-shadow:0 -20px 50px rgba(0,0,0,.25);}
    .grab{width:54px; height:5px; border-radius:999px; background:#d4e0e2; margin:8px auto 14px;}
    .sheettitle{display:flex; align-items:start; justify-content:space-between; gap:12px; margin-bottom:12px;}
    .sheettitle h2{margin:0; font-size:25px; line-height:1.05; font-weight:950; letter-spacing:-.04em;}
    .sub{color:var(--muted); font-weight:800; margin-top:5px;}
    .detailgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
    .detailbox{background:#f8fbfb; border:1px solid var(--line2); border-radius:18px; padding:13px; overflow:hidden;}
    .detailbox span{display:block; color:#65767c; font-size:13px; font-weight:850;}
    .detailbox strong{display:block; margin-top:3px; font-size:17px; font-weight:950; overflow-wrap:anywhere;}
    .toolbar{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0;}
    .ghost{border:1px solid #cfe3e5; background:#f9ffff; color:#136f67; border-radius:17px; padding:13px 14px; font-weight:950;}
    .ghost.danger{border-color:#ffd2cc;background:#fff6f5;color:#bd302a;}
    .kanban{display:flex; gap:12px; overflow-x:auto; padding:4px 0 12px; scroll-snap-type:x proximity;}
    .lane{flex:0 0 82%; max-width:350px; background:#f5fafb; border:1px solid var(--line); border-radius:22px; padding:12px; scroll-snap-align:start;}
    .lanetitle{display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:17px; font-weight:950; margin-bottom:10px;}
    .mini{font-size:13px; color:#607177; background:#fff; padding:4px 9px; border-radius:999px;}
    .kcard{background:#fff; border:1px solid var(--line2); border-radius:17px; padding:12px; margin-bottom:9px; box-shadow:0 7px 17px rgba(6,39,47,.06);}
    .kcard strong{display:block; font-size:17px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .kcard span{display:block; color:#65767c; font-size:13px; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .msgcard{background:#fff; border:1px solid var(--line); border-radius:22px; padding:14px; box-shadow:0 9px 24px rgba(14,44,52,.07);}
    .msgcard h3{margin:0 0 5px; font-size:20px; font-weight:950; letter-spacing:-.03em;}
    .msgtext{white-space:pre-wrap; color:#40535a; background:#f8fbfb; border:1px solid var(--line2); border-radius:16px; padding:12px; margin-top:10px; max-height:142px; overflow:auto;}
    .smallrow{display:flex; flex-wrap:wrap; align-items:center; gap:8px; color:#65767c; font-size:13px; font-weight:800;}
    .empty{border:2px dashed #d6e7e9; border-radius:24px; padding:22px; text-align:center; color:#5e7177; font-weight:850; background:rgba(255,255,255,.65);}
    .toast{position:fixed; left:50%; bottom:calc(78px + var(--safe-bottom)); transform:translateX(-50%) translateY(20px); z-index:100; background:#122a31; color:white; border-radius:999px; padding:12px 16px; font-weight:900; opacity:0; pointer-events:none; transition:.18s ease; box-shadow:0 14px 36px rgba(0,0,0,.24); max-width:calc(100vw - 28px); text-align:center;}
    .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
    .note{font-size:13px; color:#607177; line-height:1.4; background:#f7fbfb; border:1px solid var(--line); border-radius:16px; padding:12px;}
    @media (max-width:390px){
      .topbar{padding-left:10px; padding-right:10px;}
      .content{padding-left:10px; padding-right:10px;}
      .searchrow{grid-template-columns:minmax(0,1fr) 50px 50px; gap:8px;}
      .searchbox{font-size:16px; padding:14px 13px;}
      .iconbtn{height:50px; border-radius:16px;}
      .cloud{padding:9px 10px; font-size:14px;}
      .jobtop{grid-template-columns:62px minmax(0,1fr) auto; gap:10px;}
      .avatar{width:62px; height:62px; font-size:30px; border-radius:16px;}
      .jobtitle{font-size:19px;}
      .jobmeta{font-size:15px;}
      .badge{padding:9px 10px; max-width:86px; font-size:13px;}
      .moneygrid{gap:7px;}
      .money{padding:10px 8px;}
      .money strong{font-size:17px;}
      .money span{font-size:12px;}
      .twocol,.threecol{grid-template-columns:1fr;}
      .toolbar{grid-template-columns:1fr;}
    }
    @media (min-width:760px){
      body{background:#dce8ea;}
      .app{border-left:1px solid #d0dfe2; border-right:1px solid #d0dfe2;}
      .lane{flex-basis:320px;}
    }
    @media print{
      .topbar,.bottomnav,.drawer,.sheet,.toast{display:none !important;}
      .app{max-width:none; box-shadow:none; background:white;}
      .content{padding:0;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toprow">
        <div class="brand">
          <h1>CroTeak Planner</h1>
          <div class="build">MOBILE BUILD032 PWA • schema v4</div>
        </div>
        <div class="cloud" id="saveStatus"><span class="dot"></span><span>Save OK</span></div>
      </div>
      <div class="searchrow">
        <input id="globalSearch" class="searchbox" placeholder="Traži kupca, brod, lokaciju, chat..." autocomplete="off" />
        <button class="iconbtn" id="menuBtn" title="Meni">☰</button>
        <button class="iconbtn" id="quickSyncBtn" title="Backup">↻</button>
      </div>
    </header>

    <main class="content">
      <section id="screenHome" class="screen active"></section>
      <section id="screenJobs" class="screen"></section>
      <section id="screenMessages" class="screen"></section>
      <section id="screenCalendar" class="screen"></section>
      <section id="screenFinance" class="screen"></section>
    </main>

    <nav class="bottomnav">
      <button class="navitem active" data-screen="home"><span class="ico">⌂</span><span>Početna</span></button>
      <button class="navitem" data-screen="jobs"><span class="ico">▤</span><span>Poslovi</span></button>
      <button class="navitem" data-screen="messages"><span class="ico">✉</span><span>Poruke</span></button>
      <button class="navitem" data-screen="calendar"><span class="ico">◇</span><span>Plan</span></button>
      <button class="navitem" data-screen="finance"><span class="ico">€</span><span>Novac</span></button>
    </nav>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawerpanel">
      <div class="drawerhead"><h3>Meni</h3><button class="closebtn" id="drawerClose">×</button></div>
      <button class="menubtn" id="drawerNewJob"><span>+ Novi posao</span><span>›</span></button>
      <button class="menubtn" id="drawerNewMsg"><span>+ Zalijepi chat / poruku</span><span>›</span></button>
      <button class="menubtn" id="drawerExport"><span>Backup JSON</span><span>↧</span></button>
      <button class="menubtn" id="drawerImport"><span>Import JSON</span><span>↥</span></button>
      <button class="menubtn" id="drawerCsv"><span>Export CSV</span><span>↧</span></button>
      <button class="menubtn" id="drawerPrint"><span>Print / PDF pregled</span><span>⌁</span></button>
      <button class="menubtn danger" id="drawerReset"><span>Reset demo podataka</span><span>!</span></button>
      <div class="note" style="margin-top:14px">BUILD032 je mobilni PWA build s popravljanjem širine ekrana i novim tabom Poruke. Podaci se spremaju lokalno u browseru. Backup JSON koristi za prijenos između mobitela/računala.</div>
      <input type="file" id="importFile" accept="application/json,.json" class="hidden" />
    </div>
  </div>

  <div class="sheet" id="jobSheet"><div class="sheetpanel"><div class="grab"></div><div id="jobSheetContent"></div></div></div>
  <div class="sheet" id="formSheet"><div class="sheetpanel"><div class="grab"></div><div id="formSheetContent"></div></div></div>
  <div class="toast" id="toast"></div>

  <script>
    const BUILD = 'MOBILE BUILD032 PWA';
    const SCHEMA = 4;
    const STORAGE_KEY = 'croteak_planner_mobile_schema_v4';
    const STATUS = ['Upit','Ponuda','Avans','Izmjera','Dizajn','CNC','Spremno','Montaža','Naplaćeno','Arhiva'];
    const STATUS_CLASS = { 'Upit':'upit','Ponuda':'ponuda','Avans':'avans','Izmjera':'izmjera','Dizajn':'dizajn','CNC':'cnc','Spremno':'spremno','Montaža':'montaza','Naplaćeno':'naplaceno','Arhiva':'arhiva','Kasni':'kasni' };
    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));
    const eur = n => `${Math.round(Number(n || 0)).toLocaleString('hr-HR')} €`;
    const todayISO = () => new Date().toISOString().slice(0,10);
    const uid = prefix => `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2,8)}`;
    let currentScreen = 'home';
    let statusFilter = 'Sve';
    let search = '';
    let selectedJobId = null;

    function seedData(){
      const now = new Date().toISOString();
      return {
        schema: SCHEMA,
        build: BUILD,
        updatedAt: now,
        jobs: [
          {id:'job_demo_1', boat:'Merry Fisher 925', customer:'Ivan Logara', phone:'0915758646', location:'Omiš', status:'Izmjera', quote:1100, advance:400, estimate:1100, materialCost:260, travelCost:80, laborCost:160, otherCost:0, deadline:'', measureDate:todayISO(), installDate:'', color:'Sivo / crno', notes:'Primjer posla za testiranje. Klikni karticu za detalje.', createdAt:now, updatedAt:now},
          {id:'job_demo_2', boat:'Arvor 215 AS', customer:'Zoki Radman', phone:'0994119579', location:'Split, lučica Spinut', status:'Izmjera', quote:1100, advance:300, estimate:1100, materialCost:290, travelCost:120, laborCost:150, otherCost:0, deadline:'', measureDate:todayISO(), installDate:'', color:'Teak / black', notes:'Primjer za plan rute Split.', createdAt:now, updatedAt:now},
          {id:'job_demo_3', boat:'Merry Fisher 705', customer:'Ivo Burica, žena Meri', phone:'0950154000', location:'Sukošan / Zadar', status:'Upit', quote:900, advance:0, estimate:900, materialCost:210, travelCost:70, laborCost:120, otherCost:0, deadline:'', measureDate:'', installDate:'', color:'', notes:'Upit s Facebooka / WhatsAppa.', createdAt:now, updatedAt:now},
          {id:'job_demo_4', boat:'Beneteau Antares', customer:'Marko', phone:'', location:'Pirovac', status:'Ponuda', quote:0, advance:0, estimate:0, materialCost:0, travelCost:0, laborCost:0, otherCost:0, deadline:'', measureDate:'', installDate:'', color:'', notes:'Čeka okvirne slike i mjere.', createdAt:now, updatedAt:now},
          {id:'job_demo_5', boat:'Gumenjak 6m', customer:'Ana', phone:'', location:'Zadar', status:'Spremno', quote:0, advance:0, estimate:0, materialCost:0, travelCost:0, laborCost:0, otherCost:0, deadline:'', measureDate:'', installDate:'', color:'', notes:'Spremno za montažu kad je ruta Zadar.', createdAt:now, updatedAt:now}
        ],
        messages: [
          {id:'msg_demo_1', jobId:'job_demo_3', customer:'Ivo Burica', source:'Facebook', receivedAt:now, text:'Pozdrav, zanima me EVA foam za Merry Fisher 705. Brod je kod Zadra. Možete li dati okvirnu cijenu?', createdAt:now}
        ],
        material: [
          {id:'mat_1', name:'EVA teak/crna 2400x1200 6mm', qty:10, reserved:2, price:65},
          {id:'mat_2', name:'EVA siva/crna 2400x1200 6mm', qty:5, reserved:1, price:65}
        ]
      };
    }

    let db = loadDB();

    function loadDB(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        try { return normalizeDB(JSON.parse(raw)); } catch(e){}
      }
      // pokušaj naći stariji lokalni backup iz eventualnog builda
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(!k || !/croteak|ct_/i.test(k) || k === STORAGE_KEY) continue;
        try{
          const obj = JSON.parse(localStorage.getItem(k));
          if(obj && (Array.isArray(obj.jobs) || Array.isArray(obj.poslovi))) return normalizeDB(obj);
        }catch(e){}
      }
      const fresh = seedData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
      return fresh;
    }

    function normalizeDB(obj){
      const now = new Date().toISOString();
      const out = {
        schema: SCHEMA,
        build: BUILD,
        updatedAt: obj.updatedAt || now,
        jobs: Array.isArray(obj.jobs) ? obj.jobs : (Array.isArray(obj.poslovi) ? obj.poslovi : []),
        messages: Array.isArray(obj.messages) ? obj.messages : (Array.isArray(obj.poruke) ? obj.poruke : []),
        material: Array.isArray(obj.material) ? obj.material : []
      };
      out.jobs = out.jobs.map(j => ({
        id: j.id || uid('job'),
        boat: j.boat || j.brod || '',
        customer: j.customer || j.kupac || j.name || '',
        phone: j.phone || j.telefon || '',
        location: j.location || j.lokacija || '',
        status: STATUS.includes(j.status) ? j.status : (j.status || 'Upit'),
        quote: Number(j.quote ?? j.ponuda ?? 0),
        advance: Number(j.advance ?? j.avans ?? 0),
        estimate: Number(j.estimate ?? j.procjena ?? j.quote ?? j.ponuda ?? 0),
        materialCost: Number(j.materialCost ?? j.trosakMaterijala ?? 0),
        travelCost: Number(j.travelCost ?? j.trosakPuta ?? 0),
        laborCost: Number(j.laborCost ?? j.trosakRada ?? 0),
        otherCost: Number(j.otherCost ?? j.ostaliTrosak ?? 0),
        deadline: j.deadline || j.rok || '',
        measureDate: j.measureDate || j.datumIzmjere || '',
        installDate: j.installDate || j.datumMontaze || '',
        color: j.color || j.boja || '',
        notes: j.notes || j.biljeske || '',
        createdAt: j.createdAt || now,
        updatedAt: j.updatedAt || now
      }));
      out.messages = out.messages.map(m => ({
        id: m.id || uid('msg'),
        jobId: m.jobId || m.posaoId || '',
        customer: m.customer || m.kupac || '',
        source: m.source || m.izvor || 'Ručno',
        receivedAt: m.receivedAt || m.datum || now,
        text: m.text || m.poruka || m.chat || '',
        createdAt: m.createdAt || now
      }));
      return out;
    }

    function saveDB(){
      db.schema = SCHEMA;
      db.build = BUILD;
      db.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
      flashSave();
    }
    let saveTimer;
    function flashSave(){
      const el = $('#saveStatus');
      el.innerHTML = '<span class="dot"></span><span>Save OK</span>';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>{ el.innerHTML = '<span class="dot"></span><span>Save OK</span>'; }, 900);
    }
    function toast(msg){
      const el = $('#toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(()=> el.classList.remove('show'), 2200);
    }
    function closeSheets(){ $('#jobSheet').classList.remove('open'); $('#formSheet').classList.remove('open'); }

    function filteredJobs(){
      const q = search.trim().toLowerCase();
      return db.jobs.filter(j => {
        const matchesStatus = statusFilter === 'Sve' || j.status === statusFilter;
        if(!matchesStatus) return false;
        if(!q) return true;
        const msg = db.messages.filter(m=>m.jobId===j.id).map(m=>m.text).join(' ');
        return [j.boat,j.customer,j.phone,j.location,j.status,j.color,j.notes,msg].join(' ').toLowerCase().includes(q);
      }).sort((a,b)=> new Date(b.updatedAt||b.createdAt) - new Date(a.updatedAt||a.createdAt));
    }
    function totals(){
      const active = db.jobs.filter(j=>!['Naplaćeno','Arhiva'].includes(j.status));
      const quote = db.jobs.reduce((s,j)=>s+Number(j.quote||0),0);
      const advance = db.jobs.reduce((s,j)=>s+Number(j.advance||0),0);
      const due = db.jobs.reduce((s,j)=>s+Math.max(Number(j.quote||0)-Number(j.advance||0),0),0);
      const cost = db.jobs.reduce((s,j)=>s+Number(j.materialCost||0)+Number(j.travelCost||0)+Number(j.laborCost||0)+Number(j.otherCost||0),0);
      return {active:active.length, waiting:0, quote, advance, due, cost, profit:quote-cost};
    }
    function moneyParts(j){
      const quote = Number(j.quote||0);
      const advance = Number(j.advance||0);
      const due = Math.max(quote-advance,0);
      const cost = Number(j.materialCost||0)+Number(j.travelCost||0)+Number(j.laborCost||0)+Number(j.otherCost||0);
      const profit = quote-cost;
      return {quote, advance, due, cost, profit, estimate:Number(j.estimate||quote||0)};
    }
    function badge(status){ return `<span class="badge ${STATUS_CLASS[status]||''}">${escapeHTML(status||'Upit')}</span>`; }
    function initials(j){
      const source = (j.customer || j.boat || 'CT').trim();
      const parts = source.split(/\s+/).filter(Boolean);
      const chars = parts.length > 1 ? (parts[0][0]+parts[1][0]) : source.slice(0,2);
      return (chars || 'CT').toUpperCase();
    }
    function escapeHTML(s){ return String(s ?? '').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    function fmtDate(s){ if(!s) return ''; try { return new Date(s).toLocaleDateString('hr-HR'); } catch(e){ return s; } }
    function jobCard(j){
      const m = moneyParts(j);
      return `<article class="jobcard" data-job-id="${j.id}">

    }

          <div class="field"><label>Chat / poruka</label><textarea class="textarea" name="text" style="min-height:190px" placeholder="Ovdje zalijepi cijeli chat ili bitan dio...">${escapeHTML(m?.text||'')}</textarea></div>
          <button class="primary" type="submit">Spremi chat</button>
          ${m?'<button class="ghost danger" type="button" id="deleteMsgBtn">Obriši chat</button>':''}
        </form>`;
      $('#formSheet').classList.add('open');
      $('#closeForm').onclick=closeSheets;
      $('#msgForm').onsubmit = ev => {
        ev.preventDefault();
        const data = Object.fromEntries(new FormData(ev.target).entries());
        data.receivedAt = data.receivedAt ? new Date(data.receivedAt).toISOString() : new Date().toISOString();
        const now = new Date().toISOString();
        if(m){ Object.assign(m, data); }
        else { db.messages.unshift(Object.assign({id:uid('msg'), createdAt:now}, data)); }
        const job = data.jobId && db.jobs.find(j=>j.id===data.jobId); if(job) job.updatedAt = now;
        saveDB(); closeSheets(); render(); if(job) openJobDetail(job.id); toast('Chat spremljen');
      };
      const del = $('#deleteMsgBtn');
      if(del) del.onclick = () => { if(confirm('Obrisati ovaj chat?')){ db.messages = db.messages.filter(x=>x.id!==m.id); saveDB(); closeSheets(); render(); toast('Chat obrisan'); } };
    }
    function toDatetimeLocal(iso){
      try{ const d=new Date(iso); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }catch(e){return '';}
    }

    function deleteJob(id){
      const j = db.jobs.find(x=>x.id===id); if(!j) return;
      if(!confirm(`Obrisati posao: ${j.boat}?`)) return;
      db.jobs = db.jobs.filter(x=>x.id!==id);
      db.messages.forEach(m=>{ if(m.jobId===id) m.jobId=''; });
      saveDB(); closeSheets(); render(); toast('Posao obrisan');
    }
    function copyWhatsApp(id){
      const j = db.jobs.find(x=>x.id===id); if(!j) return;
      const m = moneyParts(j);
      const txt = `Pozdrav ${j.customer || ''},\n\nZa brod ${j.boat || ''} ukupna ponuda je ${eur(m.quote)}.\nPrimljeni avans: ${eur(m.advance)}.\nOstatak za naplatiti: ${eur(m.due)}.\n\nStatus: ${j.status}.\nLokacija: ${j.location || '-'}\n\nCroTeak`;
      navigator.clipboard?.writeText(txt).then(()=>toast('WhatsApp tekst kopiran')).catch(()=>{ prompt('Kopiraj tekst:', txt); });
    }
    function openReport(id){
      const j = db.jobs.find(x=>x.id===id); if(!j) return;
      const m = moneyParts(j);
      const msgs = db.messages.filter(x=>x.jobId===id);
      const html = `<!doctype html><html><head><meta charset="utf-8"><title>Izvještaj ${escapeHTML(j.boat)}</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#14272e}h1{margin:0 0 6px}table{border-collapse:collapse;width:100%;margin:18px 0}td,th{border:1px solid #ddd;padding:9px;text-align:left}.muted{color:#667}.box{border:1px solid #ddd;border-radius:12px;padding:14px;margin:12px 0;white-space:pre-wrap}</style></head><body><h1>CroTeak Planner — izvještaj posla</h1><div class="muted">${BUILD}</div><h2>${escapeHTML(j.boat)}</h2><table><tr><th>Kupac</th><td>${escapeHTML(j.customer)}</td></tr><tr><th>Telefon</th><td>${escapeHTML(j.phone)}</td></tr><tr><th>Lokacija</th><td>${escapeHTML(j.location)}</td></tr><tr><th>Status</th><td>${escapeHTML(j.status)}</td></tr><tr><th>Boja</th><td>${escapeHTML(j.color)}</td></tr></table><h3>Financije</h3><table><tr><th>Ponuda</th><td>${eur(m.quote)}</td></tr><tr><th>Avans</th><td>${eur(m.advance)}</td></tr><tr><th>Ostatak</th><td>${eur(m.due)}</td></tr><tr><th>Trošak</th><td>${eur(m.cost)}</td></tr><tr><th>Zarada</th><td>${eur(m.profit)}</td></tr></table><h3>Bilješke</h3><div class="box">${escapeHTML(j.notes)}</div><h3>Chat</h3>${msgs.map(x=>`<div class="box"><strong>${escapeHTML(x.source)} · ${fmtDate(x.receivedAt)}</strong><br>${escapeHTML(x.text)}</div>`).join('') || '<p>Nema chata.</p>'}<script>window.print()<\/script></body></html>`;
      const w = window.open('', '_blank');
      if(w){ w.document.write(html); w.document.close(); } else { toast('Browser je blokirao izvještaj'); }
    }
    function exportJSON(){
      const blob = new Blob([JSON.stringify(db,null,2)], {type:'application/json'});
      downloadBlob(blob, `CroTeak_Planner_${BUILD.replace(/\s+/g,'_')}_backup.json`);
      toast('Backup JSON spremljen');
    }
    function exportCSV(){
      const rows = [['Brod','Kupac','Telefon','Lokacija','Status','Ponuda','Avans','Ostatak','Materijal','Put','Rad','Ostalo','Zarada','Izmjera','Montaža','Rok','Boja','Bilješke']];
      db.jobs.forEach(j=>{ const m=moneyParts(j); rows.push([j.boat,j.customer,j.phone,j.location,j.status,m.quote,m.advance,m.due,j.materialCost,j.travelCost,j.laborCost,j.otherCost,m.profit,j.measureDate,j.installDate,j.deadline,j.color,j.notes]); });
      const csv = rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(';')).join('\n');
      downloadBlob(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}), `CroTeak_Planner_${BUILD.replace(/\s+/g,'_')}.csv`);
      toast('CSV export spremljen');
    }
    function downloadBlob(blob, name){
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},2000);
    }
    function importJSON(file){
      const r = new FileReader();
      r.onload = () => {
        try{ db = normalizeDB(JSON.parse(r.result)); saveDB(); render(); toast('Import gotov'); }
        catch(e){ alert('JSON nije ispravan.'); }
      };
      r.readAsText(file);
    }

    function openDrawer(){ $('#drawer').classList.add('open'); }
    function closeDrawer(){ $('#drawer').classList.remove('open'); }
    $('#menuBtn').onclick=openDrawer;
    $('#drawerClose').onclick=closeDrawer;
    $('#drawer').onclick=e=>{ if(e.target.id==='drawer') closeDrawer(); };
    $('#drawerNewJob').onclick=()=>{closeDrawer(); openJobForm();};
    $('#drawerNewMsg').onclick=()=>{closeDrawer(); openMessageForm();};
    $('#drawerExport').onclick=()=>{closeDrawer(); exportJSON();};
    $('#drawerCsv').onclick=()=>{closeDrawer(); exportCSV();};
    $('#drawerImport').onclick=()=>{$('#importFile').click();};
    $('#drawerPrint').onclick=()=>{closeDrawer(); window.print();};
    $('#drawerReset').onclick=()=>{ if(confirm('Vratiti demo podatke? Trenutni lokalni podaci se brišu.')){ db=seedData(); saveDB(); render(); closeDrawer(); toast('Demo reset'); } };
    $('#importFile').onchange=e=>{ const f=e.target.files[0]; if(f){ closeDrawer(); importJSON(f); e.target.value=''; } };
    $('#quickSyncBtn').onclick=exportJSON;
    $('#globalSearch').addEventListener('input', e=>{ search=e.target.value; render(); });
    $('#globalSearch').addEventListener('focus', ()=>{ if(currentScreen==='home') switchScreen('jobs'); });
    $$('.navitem').forEach(n=>n.onclick=()=>switchScreen(n.dataset.screen));
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') { closeSheets(); closeDrawer(); } if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='f'){ e.preventDefault(); $('#globalSearch').focus(); } });

    if('serviceWorker' in navigator && location.protocol !== 'file:'){
      window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
    render();
  </script>
</body>
</html>
